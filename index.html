<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">

        <div class="logo">
            <span>N</span>ova Search
        </div>

        <p class="tagline">
            Discover • Explore • Search Smarter
        </p>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search anything...">
            <button>Search</button>
        </div>

        <div class="categories">
             <div class="card" data-type="images">
                <div class="icon">🖼️</div>
                <h3>Images</h3>
            </div>

            <div class="card" data-type="videos">
                <div class="icon">🎥</div>
                <h3>Videos</h3>
            </div>

            <div class="card" data-type="news">
                <div class="icon">📰</div>
                <h3>News</h3>
            </div>

        </div>
            

        <div class="footer">
            Powered by Nova Search Engine Concept
        </div>
        <script src="script.js"></script>

    </div>

</body>
</html>
