<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Search - Results</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra custom styling specifically for the results view */
        .results-container {
            max-width: 800px;
            margin: 40px auto;
            text-align: left;
            padding: 0 20px;
            width: 100%;
        }
        .results-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        .results-header h2 {
            font-size: 1.8rem;
            cursor: pointer;
        }
        .search-term-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
        }
        .simulated-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .simulated-card a {
            color: #38bdf8;
            font-size: 1.2rem;
            text-decoration: none;
            font-weight: 600;
        }
        .simulated-card a:hover {
            text-decoration: underline;
        }
        .simulated-card p {
            color: #cbd5e1;
            margin-top: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .back-btn {
            color: #ffffff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body style="justify-content: flex-start; align-items: stretch;">

    <div class="results-container">
        <a href="index.html" class="back-btn">← Back to Search</a>
        
        <div class="results-header">
            <h2 onclick="window.location.href='index.html'"><span style="color: #38bdf8;">N</span>ova</h2>
            <div class="search-term-display">
                Searching for: <strong id="query-target">...</strong>
            </div>
        </div>

        <div id="results-list">
            </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Grab the search query string out of the browser URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            const type = urlParams.get('type') || 'all';

            // 2. Display the keyword on screen
            document.getElementById("query-target").textContent = query;

            // 3. Generate mock custom search results layout dynamically
            const resultsList = document.getElementById("results-list");
            
            if(query.trim() === "") {
                resultsList.innerHTML = `<p>No search terms provided.</p>`;
                return;
            }

            resultsList.innerHTML = `
                <div class="simulated-card">
                    <a href="#">Top Custom Result for "${query}"</a>
                    <p>This is a simulated search matching your request. Nova engine processed your data structure natively under the <strong>${type}</strong> category matrix.</p>
                </div>
                <div class="simulated-card">
                    <a href="#">Exploring Information Architectures</a>
                    <p>Discover academic files, technical project frameworks, and documentation regarding "${query}" compiled dynamically on the frontend interface.</p>
                </div>
            `;
        });
    </script>
</body>
</html>
